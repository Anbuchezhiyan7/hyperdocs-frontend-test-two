name: Bundle Diff & Budget Check

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  bundle-budget:
    name: Bundle Size Budget
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          # Required env vars for build (use GitHub Secrets)
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'https://placeholder.api' }}
          NEXT_PUBLIC_ENVIRONMENT: production
          NEXT_PUBLIC_POSTHOG_TOKEN: ${{ secrets.NEXT_PUBLIC_POSTHOG_TOKEN || 'placeholder' }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST || 'https://app.posthog.com' }}

      - name: Run bundle budget check
        id: budget
        run: |
          node scripts/check-bundle-budget.js 2>&1 | tee bundle-report.txt
          echo "BUDGET_OUTPUT<<EOF" >> $GITHUB_OUTPUT
          cat bundle-report.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comment bundle report on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.budget.outputs.BUDGET_OUTPUT }}`;
            const passed = !output.includes('❌');
            const emoji  = passed ? '✅' : '❌';

            const body = [
              `## ${emoji} Bundle Budget Report`,
              '',
              '```',
              output,
              '```',
              '',
              passed
                ? '> Bundle is within budget. Safe to merge.'
                : '> **Bundle exceeds budget!** Investigate before merging.',
              '',
              `_Generated by [bundle-diff.yml](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})_`,
            ].join('\n');

            // Delete previous bot comments to avoid noise
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });

            for (const comment of comments.data) {
              if (comment.user.type === 'Bot' && comment.body.includes('Bundle Budget Report')) {
                await github.rest.issues.deleteComment({
                  owner:      context.repo.owner,
                  repo:       context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail CI if budget exceeded
        run: |
          if grep -q "❌" bundle-report.txt; then
            echo "Bundle budget exceeded — failing CI"
            exit 1
          fi
